<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis — Please Retry</title>
  <style>
    :root{--ink:#1a2233;--muted:#5b6577;--line:#e2e6ee;--accent:#3b5bdb;--bg:#f7f8fb;--card:#fff;--warn:#e08a2b;}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
    .wrap{max-width:560px;margin:0 auto;padding:80px 24px;text-align:center}
    .icon{font-size:2.4rem;margin-bottom:12px}
    h1{font-size:1.5rem;margin:0 0 12px}
    .msg{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--warn);
      border-radius:10px;padding:20px 22px;color:var(--muted);text-align:left;margin:0 0 28px}
    a.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;
      padding:13px 28px;border-radius:10px;font-weight:600}
    a.btn:hover{background:#2f4bc4}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">⏳</div>
    <h1>Analysis didn't complete</h1>
    <div class="msg" th:text="${error}">Something went wrong. Please try again.</div>
    <a class="btn" href="/">← Try again</a>
  </div>
</body>
</html>
